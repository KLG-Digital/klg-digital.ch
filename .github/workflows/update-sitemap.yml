name: Update Sitemap

on:
  push:
    branches:
      - main

jobs:
  sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate sitemap
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          cat > sitemap.xml << SITEMAP
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <url><loc>https://klg-digital.ch/</loc><lastmod>${TODAY}</lastmod><changefreq>weekly</changefreq><priority>1.0</priority></url>
            <url><loc>https://klg-digital.ch/pages/it/</loc><lastmod>${TODAY}</lastmod><changefreq>monthly</changefreq><priority>0.9</priority></url>
            <url><loc>https://klg-digital.ch/pages/video/</loc><lastmod>${TODAY}</lastmod><changefreq>monthly</changefreq><priority>0.9</priority></url>
            <url><loc>https://klg-digital.ch/pages/photo/</loc><lastmod>${TODAY}</lastmod><changefreq>monthly</changefreq><priority>0.9</priority></url>
            <url><loc>https://klg-digital.ch/pages/acting/</loc><lastmod>${TODAY}</lastmod><changefreq>monthly</changefreq><priority>0.8</priority></url>
            <url><loc>https://klg-digital.ch/pages/services/</loc><lastmod>${TODAY}</lastmod><changefreq>monthly</changefreq><priority>0.9</priority></url>
            <url><loc>https://klg-digital.ch/pages/parcours/</loc><lastmod>${TODAY}</lastmod><changefreq>monthly</changefreq><priority>0.7</priority></url>
            <url><loc>https://klg-digital.ch/pages/programmes/</loc><lastmod>${TODAY}</lastmod><changefreq>monthly</changefreq><priority>0.7</priority></url>
            <url><loc>https://klg-digital.ch/pages/apropos/</loc><lastmod>${TODAY}</lastmod><changefreq>monthly</changefreq><priority>0.7</priority></url>
            <url><loc>https://klg-digital.ch/pages/contact/</loc><lastmod>${TODAY}</lastmod><changefreq>monthly</changefreq><priority>0.8</priority></url>
            <url><loc>https://klg-digital.ch/pages/privacy/</loc><lastmod>${TODAY}</lastmod><changefreq>yearly</changefreq><priority>0.3</priority></url>
          </urlset>
          SITEMAP

      - name: Commit sitemap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff --staged --quiet || git commit -m "chore: update sitemap [$(date -u +%Y-%m-%d)]"
          git push
