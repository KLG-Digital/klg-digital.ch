<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KLG Digital — IT, Vidéo, Photo & Acting | Chablais, Vaud</title>
  <meta name="description" content="Kevin Lemos Graça — Informaticien infrastructure CFC, créateur de contenu et développeur basé dans le Chablais vaudois. IT, vidéo, photo et acting. Disponible pour vos projets en Suisse romande.">
  <meta name="keywords" content="informaticien Chablais, support informatique Vaud, montage vidéo Suisse romande, KLG Digital, Kevin Lemos Graca">
  <meta name="author" content="Kevin Lemos Graça">
  <meta property="og:title" content="KLG Digital — Un souci ? Me voici.">
  <meta property="og:description" content="Informaticien infrastructure, créateur de contenu et développeur basé dans le Chablais vaudois.">
  <meta property="og:url" content="https://klg-digital.ch/">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/png" href="images/KLG-Digital-blanc.png" id="favicon">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- ======================== FAVICON ======================== -->
  <script>
    // Favicon dynamique selon le thème système
    (function() {
      const favicon = document.getElementById('favicon');
      const update = (dark) => favicon.href = dark
        ? 'images/KLG-Digital-blanc.png'
        : 'images/KLG-Digital-noir.png';
      const mq = window.matchMedia('(prefers-color-scheme: dark)');
      update(mq.matches);
      mq.addEventListener('change', e => update(e.matches));
    })();
  </script>
  <!-- ================================================= -->

  <!-- ======================== STYLES ======================== -->
  <style>

    /* --------------------- VARIABLES PLANÈTES --------------------- */
    /* Spécifique à cette page — cercle orbital */
    :root {
      --radius:        clamp(120px, 28vmin, 200px);
      --planet-size:   clamp(70px, 16vmin, 110px);
      --planet-offset: calc(var(--planet-size) / 2);
    }

    /* --------------------- LAYOUT --------------------- */
    /* Body en flex column 100vh — navbar + hero + footer sans scroll */
    body {
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .navbar      { flex-shrink: 0; }
    .site-footer { flex-shrink: 0; }

    /* --------------------- HERO --------------------- */
    /* Hero flex : texte en haut, planètes centrées dans l'espace restant */
    .hero {
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      min-height: 0;
    }

    /* --- Texte d'accroche --- */
    .hero-content {
      position: relative;
      z-index: 1;
      text-align: center;
      width: 100%;
      padding: clamp(8px, 2vh, 20px) 24px 0;
      flex-shrink: 0;
    }

    .hero-slogan {
      font-size: clamp(0.7em, 1.8vw, 0.9em);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #a855f7;
      margin-bottom: 8px;
    }

    .hero-h1 {
      font-size: clamp(1.3em, 3.5vw, 2.2em);
      font-weight: 800;
      color: white;
      margin-bottom: 10px;
      line-height: 1.2;
    }

    .hero-desc {
      font-size: clamp(0.75em, 1.6vw, 0.9em);
      color: #6b6b8a;
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* --- Planètes — wrapper orbital --- */
    .orbit-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .orbit-container {
      position: relative;
      width:  calc(var(--radius) * 2 + var(--planet-size));
      height: calc(var(--radius) * 2 + var(--planet-size));
    }

    /* --- Planète de base --- */
    .planet {
      position: absolute;
      width:  var(--planet-size);
      height: var(--planet-size);
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #a855f7, #4c1d95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      font-weight: bold;
      text-decoration: none;
      font-size: clamp(0.65em, 2.5vmin, 0.9em);
      line-height: 1.6;
      gap: 4px;
      animation: float 6s ease-in-out infinite;
      animation-delay: calc(var(--i) * 1.5s);
      transition: box-shadow 0.3s, filter 0.3s;
      /* Position calculée par JS */
    }

    .planet i { font-size: 1.3em; }

    .planet:hover {
      box-shadow: 0 0 25px #9333ea;
      filter: brightness(1.15);
    }

    /* --- Planète avec illustration --- */
    .planet-img {
      background: none;
      border-radius: 0;
      box-shadow: none;
      background-image: var(--bg-img);
      background-size: contain;
      background-position: center top;
      background-repeat: no-repeat;
      justify-content: flex-end;
      align-items: center;
      padding-bottom: 0;
      height: calc(var(--planet-size) * 1.6);
      width: calc(var(--planet-size) * 1.6);
      filter: drop-shadow(0 0 0px rgba(168,85,247,0));
      transition: filter 0.3s, transform 0.3s;
    }

    .planet-img:hover {
      box-shadow: none !important;
      filter: drop-shadow(0 0 12px rgba(168,85,247,0.7)) brightness(1.1);
    }

    .planet-img .planet-label {
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: clamp(0.7em, 2vmin, 0.9em);
      font-weight: 700;
      color: white;
    }

    /* --- Animation float --- */
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(clamp(-6px, -2vmin, -12px)); }
    }

    /* --------------------- MODE CLAIR --------------------- */
    [data-theme="light"] .hero-h1      { color: #1a1a2e; }
    [data-theme="light"] .hero-desc    { color: #5a5a7a; }
    [data-theme="light"] .planet       { animation: none; }
    [data-theme="light"] .planet-label { color: #1a1a2e; }

    /* --------------------- RESPONSIVE --------------------- */
    /* Petits écrans (iPhone SE/4/5) — réduire pour que tout rentre */
    @media (max-width: 500px), (max-height: 780px) {
      :root {
        --radius:      clamp(75px, 24vmin, 120px);
        --planet-size: clamp(55px, 18vmin, 80px);
      }
      .hero-content { padding-top: 4px; }
      .hero-h1      { font-size: clamp(1em, 4vw, 1.5em); margin-bottom: 4px; }
      .hero-desc    { font-size: clamp(0.65em, 1.8vw, 0.78em); line-height: 1.35; max-width: 320px; }
      .hero-slogan  { margin-bottom: 2px; font-size: clamp(0.6em, 1.6vw, 0.8em); }
      .planet-img   { height: calc(var(--planet-size) * 1.2); width: calc(var(--planet-size) * 1.2); }
    }

  </style>
  <!-- ================================================= -->

</head>
<body>

  <!-- ======================== SCRIPTS GLOBAUX ======================== -->

  <!-- --- Thème sombre / clair --- -->
  <script src="js/theme.js"></script>

  <!-- --- Navbar --- -->
  <script src="js/navbar.js"></script>

  <!-- --- Fond (lune / étoiles) --- -->
  <script src="js/moon.js"></script>
  <script src="js/stars.js"></script>

  <!-- ================================================= -->


  <!-- ======================== HERO ======================== -->
  <header class="hero">

    <!-- --- Texte d'accroche --- -->
    <div class="hero-content">
      <p class="hero-slogan">✦ Un souci ? Me voici.</p>
      <h1 class="hero-h1">Kevin Lemos Graça</h1>
      <p class="hero-desc">IT, vidéo, photo et acting. Basé dans le Chablais vaudois, disponible pour vos projets en Suisse romande.</p>
    </div>

    <!-- --- Planètes en cercle --- -->
    <div class="orbit-wrapper">
      <div class="orbit-container">
        <a href="pages/it/" class="planet planet-img" style="--i:0; --bg-img: url('images/planete/IT-sombre.png')" data-img-dark="images/planete/IT-sombre.png" data-img-light="images/planete/IT-clair.png">
          <span class="planet-label">IT</span>
        </a>
        <a href="pages/video/" class="planet planet-img" style="--i:1; --bg-img: url('images/planete/Video-sombre.png')" data-img-dark="images/planete/Video-sombre.png" data-img-light="images/planete/Video-clair.png">
          <span class="planet-label">Vidéo</span>
        </a>
        <a href="pages/photo/" class="planet planet-img" style="--i:2; --bg-img: url('images/planete/Photo-sombre.png')" data-img-dark="images/planete/Photo-sombre.png" data-img-light="images/planete/Photo-clair.png">
          <span class="planet-label">Photo</span>
        </a>
        <a href="pages/acting/" class="planet planet-img" style="--i:3; --bg-img: url('images/planete/Acting-sombre.png')" data-img-dark="images/planete/Acting-sombre.png" data-img-light="images/planete/Acting-clair.png">
          <span class="planet-label">Acting</span>
        </a>
      </div>
    </div>

  </header>
  <!-- ================================================= -->


  <!-- ======================== FOOTER ======================== -->
  <script src="js/footer.js"></script>
  <!-- ================================================= -->


  <!-- ======================== SCRIPTS ======================== -->
  <script>

    // --------------------- Positionnement des planètes ---------------------
    // Calcul via JS car CSS cos/sin() n'est pas universellement supporté
    function positionPlanets() {
      const planets   = document.querySelectorAll('.planet');
      const container = document.querySelector('.orbit-container');
      if (!container || !planets.length) return;

      // Lire les tailles réelles depuis le DOM (clamp() non résolu par getComputedStyle)
      const size   = planets[0].offsetWidth;
      const radius = (container.offsetWidth - size) / 2;
      const offset = size / 2;

      planets.forEach((planet, i) => {
        const angle = (i * 90 - 90) * (Math.PI / 180);
        planet.style.left = `calc(50% + ${radius * Math.cos(angle)}px - ${offset}px)`;
        planet.style.top  = `calc(50% + ${radius * Math.sin(angle)}px - ${offset}px)`;
      });
    }

    // --------------------- Images selon le thème ---------------------
    function updatePlanetImages() {
      const theme = document.documentElement.getAttribute('data-theme') || 'dark';
      document.querySelectorAll('.planet-img').forEach(p => {
        const img = theme === 'light' ? p.dataset.imgLight : p.dataset.imgDark;
        if (img) p.style.setProperty('--bg-img', `url('${img}')`);
      });
    }

    // --------------------- Initialisation ---------------------
    document.addEventListener('DOMContentLoaded', () => {
      positionPlanets();
      updatePlanetImages();
    });

    window.addEventListener('resize', positionPlanets);

    // Observer les changements de thème pour mettre à jour les images
    new MutationObserver(updatePlanetImages).observe(
      document.documentElement,
      { attributes: true, attributeFilter: ['data-theme'] }
    );

  </script>
  <!-- ================================================= -->

</body>
</html>
